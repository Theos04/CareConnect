{% extends "base.html" %}
{% block title %}Lab onboarding | CareConnect{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
    <p class="text-sm font-semibold text-violet-700 uppercase tracking-wide mb-2">Pathology laboratory</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Register your lab</h1>
    <p class="text-gray-600 text-sm mb-8">Tell us how patients and providers will see your facility. Accreditation checks can be added in production.</p>

    <form method="post" class="space-y-5">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Legal lab name <span class="text-red-500">*</span></label>
        <input type="text" name="lab_name" required placeholder="e.g. Metro Diagnostics LLC" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">City / region <span class="text-red-500">*</span></label>
        <input type="text" name="city" required placeholder="e.g. Austin, TX" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Accreditation ID (optional)</label>
        <input type="text" name="accreditation" placeholder="CAP / ISO reference" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
      </div>
      <button type="submit" class="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition shadow-md">
        Open lab dashboard
      </button>
    </form>
  </div>
</div>
{% endblock %}
