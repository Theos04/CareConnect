<!-- Add this as a new template: secure_messaging.html -->
{% extends "base.html" %}
{% block title %}Secure Messaging | CareConnect EHR{% endblock %}

{% block content %}
<style>
  .messaging-container {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    height: calc(100vh - 120px);
    background: var(--background);
    border-radius: 24px;
    overflow: hidden;
  }

  .conversations-list {
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .conversation-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .conversation-item:hover {
    background: var(--background);
  }

  .conversation-item.active {
    background: var(--primary-glow);
    border-left: 3px solid var(--primary);
  }

  .conversation-avatar {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 1.125rem;
  }

  .conversation-info {
    flex: 1;
  }

  .conversation-name {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .conversation-last-message {
    font-size: 0.75rem;
    color: var(--text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conversation-time {
    font-size: 0.7rem;
    color: var(--text-tertiary);
  }

  .unread-badge {
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.7rem;
    font-weight: 600;
  }

  .chat-area {
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  .chat-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    display: flex;
    gap: 12px;
    max-width: 70%;
  }

  .message.sent {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .message-bubble {
    background: var(--background);
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.875rem;
    color: var(--text-primary);
  }

  .message.sent .message-bubble {
    background: var(--primary);
    color: white;
  }

  .message-time {
    font-size: 0.7rem;
    color: var(--text-tertiary);
    margin-top: 4px;
  }

  .chat-input-area {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }

  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: inherit;
    resize: none;
  }

  .attachment-btn {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--background);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>

<div class="ehr-container">
  <div class="clinical-header">
    <div class="header-top">
      <div class="patient-greeting">
        <h1>Secure Messaging</h1>
        <p>HIPAA-compliant communication with your care team</p>
      </div>
    </div>
  </div>

  <div class="messaging-container">
    <div class="conversations-list" id="conversationsList">
      <!-- Conversations loaded dynamically -->
    </div>
    <div class="chat-area" id="chatArea">
      <div class="chat-header">
        <div>
          <div class="conversation-name" id="activeConversationName">Select a conversation</div>
          <div class="conversation-last-message" id="activeConversationRole">Provider</div>
        </div>
        <button class="action-button action-button-outline" onclick="startVideoCall()">
          📹 Start Video Call
        </button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <!-- Messages loaded dynamically -->
      </div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="messageInput" placeholder="Type your message... (Encrypted & Secure)" rows="2"></textarea>
        <div class="attachment-btn" onclick="attachFile()">📎</div>
        <button class="action-button" onclick="sendMessage()">Send →</button>
      </div>
    </div>
  </div>
</div>

<script>
  let activeConversationId = null;
  let messagePollInterval = null;

  async function loadConversations() {
    const response = await fetch('/api/messaging/conversations');
    const conversations = await response.json();
    const container = document.getElementById('conversationsList');
    container.innerHTML = conversations.map(conv => `
      <div class="conversation-item" onclick="loadConversation(${conv.id})">
        <div class="conversation-avatar">${conv.provider_name[0]}</div>
        <div class="conversation-info">
          <div class="conversation-name">Dr. ${conv.provider_name}</div>
          <div class="conversation-last-message">${conv.last_message || 'No messages yet'}</div>
        </div>
        <div class="conversation-time">${conv.last_message_time || ''}</div>
        ${conv.unread_count ? `<div class="unread-badge">${conv.unread_count}</div>` : ''}
      </div>
    `).join('');
  }

  async function loadConversation(conversationId) {
    activeConversationId = conversationId;
    const response = await fetch(`/api/messaging/conversations/${conversationId}`);
    const data = await response.json();
    
    document.getElementById('activeConversationName').textContent = `Dr. ${data.provider_name}`;
    const messagesContainer = document.getElementById('chatMessages');
    messagesContainer.innerHTML = data.messages.map(msg => `
      <div class="message ${msg.sender === 'patient' ? 'sent' : 'received'}">
        <div class="message-bubble">
          ${msg.content}
          <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
        </div>
      </div>
    `).join('');
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    if (messagePollInterval) clearInterval(messagePollInterval);
    messagePollInterval = setInterval(() => loadNewMessages(conversationId), 3000);
  }

  async function loadNewMessages(conversationId) {
    const response = await fetch(`/api/messaging/conversations/${conversationId}/new`);
    const newMessages = await response.json();
    // Append new messages to chat
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !activeConversationId) return;
    
    await fetch('/api/messaging/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversationId: activeConversationId, content })
    });
    
    input.value = '';
    loadConversation(activeConversationId);
  }

  loadConversations();
</script>
{% endblock %}
