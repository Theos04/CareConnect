<!-- appointment_scheduling.html -->
{% extends "base.html" %}
{% block title %}Appointment Scheduling | CareConnect EHR{% endblock %}

{% block content %}
<style>
  .scheduling-container {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 24px;
  }

  .booking-form {
    background: var(--surface);
    border-radius: 24px;
    padding: 24px;
  }

  .calendar-container {
    background: var(--surface);
    border-radius: 24px;
    padding: 24px;
  }

  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .calendar-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--background);
  }

  .calendar-day:hover {
    background: var(--primary-glow);
    transform: scale(1.05);
  }

  .calendar-day.selected {
    background: var(--primary);
    color: white;
  }

  .calendar-day.has-appointment {
    border: 2px solid var(--primary);
  }

  .time-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 24px;
  }

  .time-slot {
    padding: 12px;
    text-align: center;
    background: var(--background);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .time-slot:hover {
    background: var(--primary);
    color: white;
  }

  .time-slot.booked {
    opacity: 0.5;
    cursor: not-allowed;
    text-decoration: line-through;
  }

  .appointment-type {
    margin: 20px 0;
  }

  .appointment-type label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .appointment-type input:checked + label {
    border-color: var(--primary);
    background: var(--primary-glow);
  }
</style>

<div class="ehr-container">
  <div class="clinical-header">
    <div class="header-top">
      <div class="patient-greeting">
        <h1>Schedule an Appointment</h1>
        <p>Book, reschedule, or manage your upcoming visits</p>
      </div>
    </div>
  </div>

  <div class="scheduling-container">
    <div class="booking-form">
      <h3 style="margin-bottom: 20px;">Appointment Details</h3>
      
      <div class="appointment-type">
        <h4 style="margin-bottom: 12px;">Appointment Type</h4>
        <input type="radio" name="appointmentType" id="virtual" value="virtual" checked hidden>
        <label for="virtual">
          <span>📹</span>
          <div>
            <strong>Virtual Visit</strong>
            <div style="font-size: 0.75rem; color: var(--text-tertiary);">Video consultation from anywhere</div>
          </div>
        </label>
        
        <input type="radio" name="appointmentType" id="inperson" value="inperson" hidden>
        <label for="inperson">
          <span>🏥</span>
          <div>
            <strong>In-Person Visit</strong>
            <div style="font-size: 0.75rem; color: var(--text-tertiary);">At our clinic location</div>
          </div>
        </label>
      </div>

      <div>
        <h4 style="margin-bottom: 12px;">Select Provider</h4>
        <select id="providerSelect" class="chat-input" style="width: 100%;">
          <option value="">Choose a provider</option>
          <option value="1">Dr. Sarah Johnson - Primary Care</option>
          <option value="2">Dr. Michael Chen - Cardiology</option>
          <option value="3">Dr. Emily Rodriguez - Endocrinology</option>
        </select>
      </div>

      <div>
        <h4 style="margin-bottom: 12px; margin-top: 20px;">Reason for Visit</h4>
        <textarea class="chat-input" rows="3" placeholder="Describe your symptoms or reason for appointment..."></textarea>
      </div>

      <button class="action-button" style="width: 100%; margin-top: 24px;" onclick="confirmBooking()">
        Confirm Appointment →
      </button>
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <button class="action-button-outline" onclick="previousMonth()">←</button>
        <h3 id="currentMonth">January 2024</h3>
        <button class="action-button-outline" onclick="nextMonth()">→</button>
      </div>
      
      <div class="calendar-grid" id="calendarGrid">
        <!-- Calendar days rendered here -->
      </div>
      
      <div class="time-slots" id="timeSlots">
        <!-- Available time slots -->
      </div>
    </div>
  </div>
</div>

<script>
  let currentDate = new Date();
  let selectedDate = null;

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startingDayOfWeek = firstDay.getDay();
    
    const calendarGrid = document.getElementById('calendarGrid');
    calendarGrid.innerHTML = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
      .map(day => `<div style="text-align: center; font-weight: 600; color: var(--text-tertiary);">${day}</div>`).join('');
    
    for (let i = 0; i < startingDayOfWeek; i++) {
      calendarGrid.innerHTML += '<div></div>';
    }
    
    for (let day = 1; day <= daysInMonth; day++) {
      const isSelected = selectedDate?.getDate() === day && 
                        selectedDate?.getMonth() === month && 
                        selectedDate?.getFullYear() === year;
      calendarGrid.innerHTML += `
        <div class="calendar-day ${isSelected ? 'selected' : ''}" onclick="selectDate(${year}, ${month}, ${day})">
          ${day}
        </div>
      `;
    }
    
    document.getElementById('currentMonth').textContent = 
      currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
  }

  function selectDate(year, month, day) {
    selectedDate = new Date(year, month, day);
    renderCalendar();
    loadTimeSlots(selectedDate);
  }

  async function loadTimeSlots(date) {
    const response = await fetch(`/api/appointments/slots?date=${date.toISOString()}`);
    const slots = await response.json();
    const container = document.getElementById('timeSlots');
    container.innerHTML = slots.map(slot => `
      <div class="time-slot ${slot.booked ? 'booked' : ''}" onclick="${!slot.booked ? `selectTimeSlot('${slot.time}')` : ''}">
        ${slot.time}
      </div>
    `).join('');
  }

  async function confirmBooking() {
    const appointmentData = {
      date: selectedDate,
      time: selectedTimeSlot,
      type: document.querySelector('input[name="appointmentType"]:checked').value,
      providerId: document.getElementById('providerSelect').value,
      reason: document.querySelector('textarea').value
    };
    
    const response = await fetch('/api/appointments/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(appointmentData)
    });
    
    if (response.ok) {
      showNotification('Appointment booked successfully!', 'success');
      // Redirect to calendar view
    }
  }

  renderCalendar();
</script>
{% endblock %}
