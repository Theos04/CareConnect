{% extends "base.html" %}
{% block title %}Choose account type | CareConnect{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
    <p class="text-sm font-semibold text-indigo-600 uppercase tracking-wide mb-2">Google sign-in</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">How will you use CareConnect?</h1>
    <p class="text-gray-600 text-sm mb-6">
      Hi {{ user.name }} — pick the account type that matches your work. You can contact support later if this needs to change.
    </p>

    <form method="post" class="space-y-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 hover:border-indigo-300 cursor-pointer">
        <input type="radio" name="role" value="patient" class="mt-1 text-indigo-600" required>
        <span>
          <span class="font-semibold text-gray-900">Patient</span>
          <span class="block text-sm text-gray-600">Care hub, prescriptions, marketplace, insurance tools.</span>
        </span>
      </label>
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 hover:border-indigo-300 cursor-pointer">
        <input type="radio" name="role" value="doctor" class="mt-1 text-indigo-600">
        <span>
          <span class="font-semibold text-gray-900">Doctor</span>
          <span class="block text-sm text-gray-600">Clinical workspace, prescriptions, queues.</span>
        </span>
      </label>
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 hover:border-indigo-300 cursor-pointer">
        <input type="radio" name="role" value="pathology" class="mt-1 text-indigo-600">
        <span>
          <span class="font-semibold text-gray-900">Pathology lab</span>
          <span class="block text-sm text-gray-600">Requisitions, samples, lab reports.</span>
        </span>
      </label>
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 hover:border-indigo-300 cursor-pointer">
        <input type="radio" name="role" value="hospital" class="mt-1 text-indigo-600">
        <span>
          <span class="font-semibold text-gray-900">Hospital / clinic (pharmacy)</span>
          <span class="block text-sm text-gray-600">Dispensing, prescription queue for your facility.</span>
        </span>
      </label>
      <label class="flex items-start gap-3 p-4 rounded-xl border border-gray-200 hover:border-indigo-300 cursor-pointer">
        <input type="radio" name="role" value="administrator" class="mt-1 text-indigo-600">
        <span>
          <span class="font-semibold text-gray-900">Administrator</span>
          <span class="block text-sm text-gray-600">Platform operations, users, and configuration (demo).</span>
        </span>
      </label>

      <button type="submit" class="w-full mt-4 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition shadow-md">
        Continue
      </button>
    </form>
  </div>
</div>
{% endblock %}
