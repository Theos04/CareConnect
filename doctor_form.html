<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Registration Form - Care Connect EHR System</title>
    <link rel="stylesheet" href="styles.css" />
    <body>
        <!-- Header Section -->
        <header>
          <h1>Care Connect</h1>
          <nav>
            <a href="index.html">Home</a>
            <a href="aboutus.html">About Us</a>
            <a href="ehrsystem.html">EHR Services</a>
            <a href="resources.html">Resources</a>
            <a href="case-studies.html">Case Studies</a>
            <a href="blog.html">Blog</a>
            <a href="contact.html">Contact</a>
          </nav>
        </header>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        width: 50%;
        margin: 50px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }
      .form-group {
        margin-bottom: 15px;
      }
      .form-group label {
        display: block;
        font-weight: bold;
        margin-bottom: 5px;
        color: #555;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-size: 16px;
        box-sizing: border-box;
      }
      .form-group textarea {
        resize: vertical;
      }
      .form-group button {
        width: 100%;
        padding: 15px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      .form-group button:hover {
        background-color: #0056b3;
      }
      .form-group .required {
        color: red;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Doctor Registration Form</h2>
      <form action="/submit_doctor_form" method="post">
        <!-- Personal Information -->
        <div class="form-group">
          <label for="first_name"
            >First Name <span class="required">*</span></label
          >
          <input type="text" id="first_name" name="first_name" required />
        </div>
        <div class="form-group">
          <label for="last_name"
            >Last Name <span class="required">*</span></label
          >
          <input type="text" id="last_name" name="last_name" required />
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth <span class="required">*</span></label>
          <input type="date" id="dob" name="dob" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender <span class="required">*</span></label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Contact Information -->
        <div class="form-group">
          <label for="phone"
            >Phone Number <span class="required">*</span></label
          >
          <input type="tel" id="phone" name="phone" required />
        </div>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <textarea id="address" name="address" rows="3"></textarea>
        </div>

        <!-- Professional Information -->
        <div class="form-group">
          <label for="specialization"
            >Specialization <span class="required">*</span></label
          >
          <input
            type="text"
            id="specialization"
            name="specialization"
            required
          />
        </div>
        <div class="form-group">
          <label for="license_number"
            >Medical License Number <span class="required">*</span></label
          >
          <input
            type="text"
            id="license_number"
            name="license_number"
            required
          />
        </div>
        <div class="form-group">
          <label for="experience"
            >Years of Experience <span class="required">*</span></label
          >
          <input
            type="number"
            id="experience"
            name="experience"
            min="0"
            required
          />
        </div>
        <div class="form-group">
          <label for="hospital_affiliation">Hospital Affiliation</label>
          <input
            type="text"
            id="hospital_affiliation"
            name="hospital_affiliation"
          />
        </div>

        <!-- Submit Button -->
        <div class="form-group">
          <button type="submit">Submit</button>
        </div>
      </form>
    </div>
  </body>
</html>
